name: E2E (POS + smoke)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Vitest)
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # El fixture por defecto importa `lovable-agent-playwright-config` (paquete
      # interno). En CI sustituimos por un fixture estándar de @playwright/test
      # antes de correr los specs.
      - name: Patch fixture for CI
        run: cp playwright-fixture.ci.ts playwright-fixture.ts

      - name: Run e2e
        run: npx playwright test --config=playwright.config.ci.ts
        env:
          CI: "true"

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload traces, videos & screenshots (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results
          retention-days: 14
          if-no-files-found: ignore

      # Resumen markdown con tests fallidos + links a run/artifacts.
      # Va al Job Summary y a `playwright-report/pr-comment.md`.
      - name: Build PR summary
        if: ${{ always() }}
        run: node scripts/summarize-playwright.cjs

      # Anotaciones nativas en el PR ya las emite el reporter `github`
      # (::error file=...,line=...). Adicionalmente posteamos un comentario
      # sticky con el resumen + link directo a los artifacts.
      - name: Comment on PR with failure summary
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: playwright-e2e
          path: playwright-report/pr-comment.md

