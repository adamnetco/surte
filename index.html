    <meta name="theme-color" content="#0C4B83" />
    <script>
      // Apply dark theme before paint to avoid FOUC
      (function() {
        try {
          var p = localStorage.getItem('sistecpos_theme_pref')
            || localStorage.getItem('surteya_theme_pref') /* legacy fallback */
            || 'system';
          var isDark = p === 'dark' || (p === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) { /* ignore */ }
      })();
    </script>
